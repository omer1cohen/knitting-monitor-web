<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<title>ניטור סריגה</title>
<style>
  :root{ --bg:#0b1220; --card:#111a2e; --line:#1e2a44; --txt:#e5edff; --muted:#8fa3c8;
         --run:#22c55e; --stop:#ef4444; --gray:#64748b; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; background:var(--bg); color:var(--txt);
        font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif; }
  header{ padding:14px 16px 6px; display:flex; align-items:baseline; justify-content:space-between; }
  header h1{ font-size:18px; margin:0; }
  #upd{ color:var(--muted); font-size:12px; }
  #totals{ padding:0 16px 10px; color:var(--muted); font-size:14px; }
  #totals b.g{ color:var(--run); } #totals b.r{ color:var(--stop); }
  #grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:0 14px 20px; }
  .st{ position:relative; border-radius:18px; background:var(--card); border:1px solid var(--line);
       padding:14px 10px 12px; text-align:center; cursor:pointer; user-select:none; }
  .ring{ width:118px; height:118px; border-radius:50%; margin:0 auto;
         display:flex; align-items:center; justify-content:center; }
  .inner{ width:92px; height:92px; border-radius:50%; background:var(--card);
          display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .inner .letter{ font-size:30px; font-weight:800; line-height:1; }
  .inner .mini{ font-size:11px; color:var(--muted); margin-top:2px; }
  .counts{ margin-top:10px; font-size:14px; }
  .counts .g{ color:var(--run); font-weight:700; } .counts .r{ color:var(--stop); font-weight:700; }
  .counts .gr{ color:var(--gray); font-weight:700; }
  .longest{ margin-top:4px; font-size:12px; color:var(--muted); min-height:15px; }
  #err{ display:none; padding:14px 16px; color:#fca5a5; font-size:14px; }
  #allbtn{ display:block; width:calc(100% - 28px); margin:0 14px 22px; padding:14px;
           background:var(--card); border:1px solid var(--line); border-radius:14px;
           color:var(--txt); font-size:16px; font-weight:700; }
  /* station sheet + machine card */
  #sheet, #mcard{ position:fixed; inset:0; background:var(--bg); transform:translateY(100%);
          transition:transform .22s ease; overflow-y:auto; }
  #sheet{ z-index:10; } #mcard{ z-index:20; }
  #sheet.open, #mcard.open{ transform:translateY(0); }
  .top{ position:sticky; top:0; background:var(--bg); padding:14px 16px;
               display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--line); }
  .top h2{ margin:0; font-size:18px; flex:1; }
  #back, #back2{ border:1px solid var(--line); background:var(--card); color:var(--txt);
         border-radius:10px; padding:8px 14px; font-size:15px; }
  /* machine card body */
  #mcard .body{ padding:14px 16px; }
  .mstate{ font-size:19px; font-weight:800; margin:4px 0 2px; }
  .msince{ color:var(--muted); font-size:13px; margin-bottom:14px; }
  .sec{ color:var(--muted); font-size:12px; margin-top:12px; }
  .tl{ position:relative; height:20px; border-radius:5px; background:var(--card);
       overflow:hidden; direction:ltr; margin:6px 0 3px; }
  .tl div{ position:absolute; top:0; height:100%; }
  .tl-lbl{ display:flex; justify-content:space-between; color:var(--muted); font-size:11px;
           direction:ltr; }
  table.hist{ width:100%; border-collapse:collapse; font-size:13px; margin-top:6px; }
  .hist th, .hist td{ padding:9px 5px; text-align:right; border-bottom:1px solid var(--line); }
  .hist th{ color:var(--muted); font-weight:400; font-size:12px; }
  .mrow{ display:flex; align-items:center; gap:10px; padding:13px 16px;
         border-bottom:1px solid var(--line); font-size:16px; }
  .dot{ width:12px; height:12px; border-radius:50%; flex:none; }
  .mid{ font-weight:800; width:44px; }
  .mtxt{ flex:1; }
  .mdur{ font-weight:700; }
  .msub{ color:var(--muted); font-size:12px; margin-top:1px; }
  #loading{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
            background:var(--bg); z-index:20; color:var(--muted); font-size:16px; }
</style>
</head>
<body>
<div id="loading">טוען נתונים מהמפעל…</div>
<header><h1>🧶 ניטור סריגה</h1><span id="upd"></span></header>
<div id="totals"></div>
<div id="err"></div>
<div id="grid"></div>
<button id="allbtn" onclick="openSheet('ALL')">📋 כל המכונות — לפי זמן עמידה</button>

<div id="sheet">
  <div class="top"><button id="back" onclick="closeSheet()">→ חזרה</button><h2 id="sh-title"></h2></div>
  <div id="sh-list"></div>
</div>

<div id="mcard">
  <div class="top"><button id="back2" onclick="closeMachine()">→ חזרה</button><h2 id="mc-title"></h2></div>
  <div class="body" id="mc-body"></div>
</div>

<script src="supabase-data.js"></script>
<script>
const SUPA_URL = 'https://gjdhfrlksymuvvosrymk.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdqZGhmcmxrc3ltdXZ2b3NyeW1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDI5NjUsImV4cCI6MjA5ODIxODk2NX0.57u4FRy0WmclcDik32PrKWJY0tq_FwH8DGnns0h_Fuc';
const REFRESH_MS = 45000;

let D = null, openStationId = null;

function fmtDur(s){
  s = Math.max(0, Math.round(s));
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  if (h > 0) return `${h}ש׳ ${m}ד׳`;
  if (m > 0) return `${m}ד׳`;
  return `${s}שנ׳`;
}
function clockOf(iso){ const m = /T(\d\d:\d\d:\d\d)/.exec(iso||''); return m ? m[1] : ''; }

function stationStats(st){
  const ids = st === 'ALL' ? D.machines.map(m => m.conveyor_id) : (D.stations[st] || []);
  const ms = D.machines.filter(m => ids.includes(m.conveyor_id));
  const run = ms.filter(m => m.state === 'running');
  const stop = ms.filter(m => m.state === 'stopped');
  const gray = ms.filter(m => m.state !== 'running' && m.state !== 'stopped');
  const longest = stop.length ? Math.max(...stop.map(m => m.duration_s)) : 0;
  return { ids, ms, run, stop, gray, longest };
}

function render(){
  const stations = Object.keys(D.stations).sort();
  let totR = 0, totS = 0;
  document.getElementById('grid').innerHTML = stations.map(st => {
    const s = stationStats(st);
    totR += s.run.length; totS += s.stop.length;
    const n = s.ms.length || 1;
    const pRun = s.run.length / n * 100, pStop = s.stop.length / n * 100;
    const ring = `conic-gradient(var(--run) 0 ${pRun}%, var(--stop) ${pRun}% ${pRun+pStop}%, var(--gray) ${pRun+pStop}% 100%)`;
    return `<div class="st" onclick="openSheet('${st}')">
      <div class="ring" style="background:${ring}"><div class="inner">
        <div class="letter">${st}</div><div class="mini">${s.ms.length} מכונות</div>
      </div></div>
      <div class="counts"><span class="g">${s.run.length} עובדות</span> · <span class="r">${s.stop.length} עומדות</span>${s.gray.length ? ` · <span class="gr">${s.gray.length} מנוטרל</span>` : ''}</div>
      <div class="longest">${s.stop.length ? `העומדת הכי הרבה: ${fmtDur(s.longest)}` : 'הכל עובד ✅'}</div>
    </div>`;
  }).join('');
  document.getElementById('totals').innerHTML =
    `כל המפעל: <b class="g">${totR} עובדות</b> · <b class="r">${totS} עומדות</b>`;
  document.getElementById('upd').textContent = `עודכן ${clockOf(D.generated_at)}`;
  if (openStationId) renderSheet(openStationId);   // keep an open sheet fresh
}

function renderSheet(st){
  const s = stationStats(st);
  const shift = D.shifts.length ? D.shifts[D.shifts.length - 1] : null;
  const bucket = {};
  if (shift) shift.machines.forEach(b => bucket[b.conveyor_id] = b);
  const order = { stopped: 0, gray: 1, unknown: 1, running: 2 };
  const rows = [...s.ms].sort((a, b) =>
    (order[a.state] ?? 1) - (order[b.state] ?? 1) || b.duration_s - a.duration_s);
  document.getElementById('sh-title').textContent =
    `${st === 'ALL' ? 'כל המכונות' : 'עמדה ' + st} — ${s.run.length} עובדות · ${s.stop.length} עומדות`;
  document.getElementById('sh-list').innerHTML = rows.map(m => {
    const b = bucket[m.conveyor_id];
    const stopsToday = b ? `${b.stop_count} עצירות במשמרת · עמדה סה״כ ${fmtDur(b.stop_s)}` : '';
    const c = m.state === 'running' ? 'var(--run)' : m.state === 'stopped' ? 'var(--stop)' : 'var(--gray)';
    const label = m.state === 'running' ? 'עובדת' : m.state === 'stopped' ? 'עומדת' : 'מנוטרלת';
    return `<div class="mrow" onclick="openMachine(${m.conveyor_id})">
      <span class="dot" style="background:${c}"></span>
      <span class="mid">#${m.conveyor_id}${st === 'ALL' ? ` <span style="color:var(--muted);font-weight:400;font-size:12px">${m.station}</span>` : ''}</span>
      <span class="mtxt"><span class="mdur" style="color:${c}">${label} ${fmtDur(m.duration_s)}</span>
        <div class="msub">${stopsToday}</div></span>
      <span style="color:var(--muted)">‹</span>
    </div>`;
  }).join('');
}

// --- machine drill-down: current state + 24h strip + per-shift history -------
const LBL_HE = { morning: 'בוקר', afternoon: 'צהריים', night: 'לילה' };
function openMachine(id){
  const m = D.machines.find(x => x.conveyor_id === id);
  if (!m) return;
  const c = m.state === 'running' ? 'var(--run)' : m.state === 'stopped' ? 'var(--stop)' : 'var(--gray)';
  const label = m.state === 'running' ? 'עובדת' : m.state === 'stopped' ? 'עומדת' : 'מנוטרלת';
  document.getElementById('mc-title').textContent = `מכונה #${id} · עמדה ${m.station}`;

  const hist = D.shifts.map(s => {
    const b = s.machines.find(x => x.conveyor_id === id);
    return b ? { date: s.shift_date, label: s.shift_label, ...b } : null;
  }).filter(Boolean).reverse();
  const histRows = hist.map(h => {
    const uc = h.util > 0.85 ? 'var(--run)' : h.util > 0.7 ? '#f59e0b' : 'var(--stop)';
    return `<tr><td>${h.date.slice(8,10)}/${h.date.slice(5,7)} ${LBL_HE[h.label]||h.label}</td>
      <td><b style="color:${uc}">${(h.util*100).toFixed(0)}%</b></td>
      <td>${fmtDur(h.run_s)}</td><td>${fmtDur(h.stop_s)}</td><td>${h.stop_count}</td></tr>`;
  }).join('');

  document.getElementById('mc-body').innerHTML = `
    <div class="mstate" style="color:${c}">● ${label} ${fmtDur(m.duration_s)}</div>
    <div class="msince">מאז ${(clockOf(m.since) || '').slice(0,5) || '—'}</div>
    <div class="sec">24 השעות האחרונות:</div>
    <div class="tl" id="mc-tl"></div>
    <div class="tl-lbl"><span id="mc-t0"></span><span id="mc-t1"></span></div>
    <div class="sec">היסטוריית משמרות:</div>
    <table class="hist">
      <tr><th>משמרת</th><th>ניצולת</th><th>עבדה</th><th>עמדה</th><th>עצירות</th></tr>
      ${histRows || '<tr><td colspan="5" class="muted">אין עדיין היסטוריה</td></tr>'}
    </table>`;
  document.getElementById('mcard').classList.add('open');
  loadTimeline(id).catch(() => {});
}
function closeMachine(){ document.getElementById('mcard').classList.remove('open'); }

async function loadTimeline(id){
  const t1 = Date.parse(D.generated_at), t0 = t1 - 24 * 3600 * 1000;
  const pad = n => String(n).padStart(2, '0');
  const d0 = new Date(t0);
  const isoLocal = `${d0.getFullYear()}-${pad(d0.getMonth()+1)}-${pad(d0.getDate())}T${pad(d0.getHours())}:${pad(d0.getMinutes())}:00`;
  const H = { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY };
  const strip = s => (s || '').replace(/(\.\d+)?(\+00:00|Z)$/, '$1');
  const base = SUPA_URL + '/rest/v1/events?select=time,state,reason&conveyor_id=eq.' + id;
  const [evR, priorR] = await Promise.all([
    fetch(`${base}&time=gte.${isoLocal}&order=time&limit=2000`, { headers: H }),
    fetch(`${base}&time=lt.${isoLocal}&order=time.desc&limit=1`, { headers: H }),
  ]);
  const ev = (await evR.json()).map(e => ({ ...e, time: strip(e.time) }));
  const prior = await priorR.json();
  if (prior.length) ev.unshift({ ...prior[0], time: isoLocal });

  const el = document.getElementById('mc-tl');
  if (!el) return;
  const span = t1 - t0;
  const col = e => e.state === 'running' ? 'var(--run)' : e.state === 'stopped' ? 'var(--stop)' : '#94a3b8';
  let html = '';
  for (let i = 0; i < ev.length; i++) {
    const a = Math.max(t0, Date.parse(ev[i].time));
    const b = Math.min(t1, i + 1 < ev.length ? Date.parse(ev[i + 1].time) : t1);
    if (b <= a) continue;
    html += `<div style="left:${(a - t0) / span * 100}%;width:${(b - a) / span * 100}%;background:${col(ev[i])}"></div>`;
  }
  el.innerHTML = html;
  document.getElementById('mc-t0').textContent = new Date(t0).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('mc-t1').textContent = new Date(t1).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
}

function openSheet(st){ openStationId = st; renderSheet(st); document.getElementById('sheet').classList.add('open'); }
function closeSheet(){ openStationId = null; document.getElementById('sheet').classList.remove('open'); }

async function refresh(){
  try {
    D = await buildSnapshotFromSupabase(SUPA_URL, SUPA_KEY, null, { skipEvents: true });
    document.getElementById('err').style.display = 'none';
    render();
  } catch (e) {
    const el = document.getElementById('err');
    el.style.display = 'block';
    el.textContent = 'שגיאה בטעינה מהענן — בדוק אינטרנט. (' + e.message + ')';
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}
refresh();
setInterval(refresh, REFRESH_MS);
document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
window.openSheet = openSheet; window.closeSheet = closeSheet;
window.openMachine = openMachine; window.closeMachine = closeMachine;
</script>
</body>
</html>
